# Service configuration consumed by dschmidt/opencloud-service-docs-action.
# See the action's README for the full schema and autodetection rules:
# https://github.com/dschmidt/opencloud-service-docs-action

service:
  # Internal service identifier. Matches config.Service{Name: "music"}
  # in backend/pkg/config/defaults/defaultconfig.go.
  name: music
  # go.mod lives under backend/, not the repo root.
  go_mod_dir: backend

site:
  title: opencloud-music
  tagline: Music extension for OpenCloud

pins:
  # opencloud-eu/markdown-docs-generator
  generator_ref: 80a5711c890de7720f53e585a32cb8be47b27709
  # opencloud-eu/docs (theme source; AGPL-3.0 — inherits to published site)
  theme_ref: 0909f2d83e91f107a770ae5da3b8d3127279c26c
  # opencloud-eu/opencloud version is resolved automatically from backend/go.mod.
